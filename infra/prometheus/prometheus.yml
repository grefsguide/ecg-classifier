global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "ecg-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: "ecg-worker-gpu"
    metrics_path: /metrics
    static_configs:
      - targets: ["worker-gpu:9101"]

  - job_name: "ecg-worker-cpu"
    metrics_path: /metrics
    static_configs:
      - targets: ["worker-cpu:9102"]