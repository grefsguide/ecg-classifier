apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ecg-classifier
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      - job_name: "ecg-api"
        metrics_path: /metrics
        static_configs:
          - targets: ["api:8000"]

      - job_name: "ecg-worker-gpu"
        metrics_path: /metrics
        static_configs:
          - targets: ["worker-gpu:9101"]

      - job_name: "ecg-worker-cpu"
        metrics_path: /metrics
        static_configs:
          - targets: ["worker-cpu:9102"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: ecg-classifier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: ecg-classifier
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090