apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: ecg-classifier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: wait-data
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              until [ -f /shared-data/ecg_img/.extracted ] && [ -f /shared-data/PTB-XL/.extracted ]; do
                echo "Waiting for data-init..."
                sleep 5
              done
          volumeMounts:
            - name: shared-data
              mountPath: /shared-data
      containers:
        - name: api
          image: ecg-classifier-app:latest
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - api.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: ecg-config
            - secretRef:
                name: ecg-secret
          volumeMounts:
            - name: shared-data
              mountPath: /shared-data
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: shared-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: ecg-classifier
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 8000
      targetPort: 8000