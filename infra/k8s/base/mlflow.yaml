apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: ecg-classifier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.14.0
          ports:
            - containerPort: 8080
          env:
            - name: MLFLOW_S3_ENDPOINT_URL
              valueFrom:
                configMapKeyRef:
                  name: ecg-config
                  key: MLFLOW_S3_ENDPOINT_URL
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ecg-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ecg-secret
                  key: AWS_SECRET_ACCESS_KEY
          command:
            - /bin/sh
            - -c
            - |
              pip install --no-cache-dir boto3 &&
              mlflow server \
                --host 0.0.0.0 \
                --port 8080 \
                --backend-store-uri sqlite:////mlflow/mlflow.db \
                --default-artifact-root s3://mlflow
          volumeMounts:
            - name: mlflow-data
              mountPath: /mlflow
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: ecg-classifier
spec:
  selector:
    app: mlflow
  ports:
    - name: http
      port: 8080
      targetPort: 8080